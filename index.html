<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex — The Honeymoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      padding: 2rem 1rem;
    }

    .pdx-root {
      display: flex; flex-direction: column; align-items: center;
    }

    .pdx-body {
      width: 340px; background: #d00000;
      border-radius: 18px 18px 10px 10px;
      box-shadow: inset -4px -4px 0 #8b0000, inset 4px 4px 0 #ff4444, 0 8px 24px #0008;
      padding: 14px 14px 20px;
    }

    .pdx-hinge {
      width: 340px; height: 14px; background: #111;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      box-shadow: 0 2px 4px #0006;
    }
    .pdx-hinge-dot { width:6px; height:6px; border-radius:50%; background:#333; }

    .pdx-bottom-body {
      width: 340px; background: #d00000;
      border-radius: 10px 10px 24px 24px;
      box-shadow: inset -4px -4px 0 #8b0000, inset 4px 4px 0 #ff4444, 0 8px 24px #0008;
      padding: 16px 14px 24px;
    }

    .pdx-top-bar { display:flex; align-items:center; gap:10px; margin-bottom:12px; }

    .pdx-blue-light {
      width:44px; height:44px; border-radius:50%;
      background: radial-gradient(circle at 35% 30%, #aaeeff, #1188dd);
      border: 4px solid #ffffff55;
      box-shadow: 0 0 0 3px #ffffff22, 0 0 14px #33aaff99;
      flex-shrink:0;
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100%{ box-shadow:0 0 0 3px #ffffff22, 0 0 10px #33aaff88; }
      50%{ box-shadow:0 0 0 3px #ffffff44, 0 0 22px #33aaffcc; }
    }

    .pdx-small-lights { display:flex; gap:7px; align-items:center; }
    .sl { width:14px; height:14px; border-radius:50%; border:2px solid #ffffff33; }

    .pdx-divider {
      height:5px;
      background: linear-gradient(to bottom, #8b0000, #cc0000);
      margin: 0 -14px 12px;
      border-top:2px solid #660000; border-bottom:2px solid #ff3333;
    }

    .pdx-screen-bezel {
      background:#222; border-radius:8px; padding:8px;
      border:3px solid #111;
      box-shadow: inset 0 0 10px #000, 0 2px 0 #ff4444;
      margin-bottom:12px;
    }

    .pdx-screen {
      background:#9bbc0f; border-radius:4px;
      padding:10px 10px 12px;
      min-height:220px;
      position:relative;
      display:flex; flex-direction:column; gap:6px;
    }

    .pdx-scanlines {
      position:absolute; inset:0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, #00000011 3px, #00000011 4px);
      pointer-events:none; border-radius:4px; z-index:2;
    }

    .pdx-row { display:flex; justify-content:space-between; font-size:6px; color:#0f380f; letter-spacing:0.05em; }
    .pdx-title { text-align:center; font-size:8px; color:#0f380f; text-shadow:1px 1px 0 #8bac0f; margin:1px 0; }
    .pdx-type-badge { text-align:center; font-size:5px; color:#306230; letter-spacing:0.08em; }

    .pdx-progress-wrap {
      background:#0f380f; border-radius:2px; height:8px; overflow:hidden; margin:2px 0;
    }
    .pdx-progress-bar {
      height:100%; background:#9bbc0f;
      box-shadow: 0 0 4px #306230;
      transition: width 1s linear;
    }
    .pdx-progress-label {
      display:flex; justify-content:space-between;
      font-size:4px; color:#306230; margin-top:2px;
    }

    .pdx-main-row { display:flex; gap:6px; align-items:flex-start; margin-top:2px; }

    .pdx-img-box {
      width:84px; min-height:84px; flex-shrink:0;
      background:#0f380f; border-radius:3px;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }

    .pdx-stats { display:flex; flex-direction:column; gap:4px; flex:1; }

    .pdx-stat-box {
      background:#0f380f; border-radius:2px;
      padding:5px 4px; text-align:center;
    }
    .pdx-stat-num { display:block; font-size:11px; color:#9bbc0f; text-shadow:0 0 4px #306230; line-height:1; }
    .pdx-stat-lbl { display:block; font-size:4px; color:#306230; margin-top:3px; letter-spacing:0.06em; }

    .pdx-footer-text {
      font-size:5px; color:#306230; line-height:2.2;
      border-top:1px solid #306230; padding-top:5px; letter-spacing:0.04em;
    }

    .cursor {
      display:inline-block; width:6px; height:9px;
      background:#0f380f;
      animation:blink 1s step-end infinite; vertical-align:middle; margin-left:1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .silhouette { filter:brightness(0); transition:filter 1.5s ease; }
    .silhouette.revealed { filter:brightness(1); }

    .capture-flash {
      position:absolute; inset:0; background:white;
      border-radius:4px; opacity:0; pointer-events:none; z-index:10;
      animation:flash 0.6s ease forwards;
    }
    @keyframes flash { 0%{opacity:0.9} 100%{opacity:0} }

    .capture-screen {
      background:#9bbc0f; border-radius:4px;
      padding:12px 10px; min-height:220px;
      position:relative; display:flex; flex-direction:column; gap:8px;
      align-items:center; justify-content:center;
      animation:fadeIn 0.8s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .capture-img-box {
      width:84px; height:84px;
      background:#0f380f; border-radius:3px;
      display:flex; align-items:center; justify-content:center;
    }

    .capture-msg { font-size:6px; color:#0f380f; text-align:center; line-height:2.2; }
    .capture-sub {
      font-size:5px; color:#306230; text-align:center; line-height:2.2;
      border-top:1px solid #306230; padding-top:6px; letter-spacing:0.04em;
    }

    .pdx-controls { display:flex; justify-content:space-between; align-items:center; padding:0 4px; }
    .dpad { width:54px; height:54px; position:relative; }
    .dpad-h { position:absolute; top:33%; left:0; width:100%; height:34%; background:#8b0000; border-radius:3px; box-shadow:inset 0 2px 0 #660000,inset 0 -2px 0 #aa2222; }
    .dpad-v { position:absolute; top:0; left:33%; width:34%; height:100%; background:#8b0000; border-radius:3px; box-shadow:inset 2px 0 0 #660000,inset -2px 0 0 #aa2222; }
    .dpad-center { position:absolute; top:33%; left:33%; width:34%; height:34%; background:#770000; }
    .pdx-startsel { display:flex; flex-direction:column; gap:8px; align-items:center; }
    .pdx-ss-btn { width:38px; height:10px; border-radius:5px; background:#8b0000; box-shadow:0 2px 0 #550000; transform:rotate(-15deg); }
    .pdx-ss-lbl { font-size:4px; color:#aa2222; letter-spacing:0.05em; transform:rotate(-15deg); display:block; text-align:center; }
    .pdx-ab { display:flex; gap:8px; align-items:flex-end; margin-bottom:4px; }
    .pdx-btn-a { width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#cc2222,#880000); box-shadow:0 3px 0 #550000,inset 0 -2px 4px #00000044; display:flex; align-items:center; justify-content:center; font-size:7px; color:#ff8888; }
    .pdx-btn-b { width:26px; height:26px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#cc2222,#880000); box-shadow:0 3px 0 #550000,inset 0 -2px 4px #00000044; display:flex; align-items:center; justify-content:center; font-size:6px; color:#ff8888; margin-bottom:2px; }
    .pdx-speaker { display:flex; flex-direction:column; gap:4px; }
    .sp-line { height:3px; background:#8b0000; border-radius:2px; box-shadow:inset 0 1px 0 #660000; }
  </style>
</head>
<body>

<div class="pdx-root">
  <div class="pdx-body">
    <div class="pdx-top-bar">
      <div class="pdx-blue-light"></div>
      <div class="pdx-small-lights">
        <div class="sl" style="background:#ff4444"></div>
        <div class="sl" style="background:#ffee44"></div>
        <div class="sl" style="background:#44ee44"></div>
      </div>
    </div>
    <div class="pdx-divider"></div>
    <div class="pdx-screen-bezel">
      <div id="pdx-screen" class="pdx-screen">
        <div class="pdx-scanlines"></div>

        <div class="pdx-row">
          <span>NO.001</span>
          <span id="end-date">--/--/----</span>
        </div>

        <div class="pdx-title">HONEYMOON</div>
        <div class="pdx-type-badge">PRE-RELACIONAL / EFIMERO</div>

        <div class="pdx-progress-wrap">
          <div class="pdx-progress-bar" id="progress-bar" style="width:100%"></div>
        </div>
        <div class="pdx-progress-label">
          <span>DIA 0</span>
          <span id="progress-text">DIA 0 / 29</span>
          <span>DIA 29</span>
        </div>

        <div class="pdx-main-row">
          <div class="pdx-img-box">
            <svg id="pangoro-svg" class="silhouette" width="80" height="82" viewBox="0 0 84 88" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="42" cy="60" rx="26" ry="24" fill="#2a2a2a"/>
              <circle cx="42" cy="30" r="20" fill="#2a2a2a"/>
              <ellipse cx="25" cy="14" rx="7" ry="8" fill="#2a2a2a"/>
              <ellipse cx="59" cy="14" rx="7" ry="8" fill="#2a2a2a"/>
              <ellipse cx="25" cy="15" rx="4" ry="5" fill="#1a1a1a"/>
              <ellipse cx="59" cy="15" rx="4" ry="5" fill="#1a1a1a"/>
              <ellipse cx="34" cy="28" rx="7" ry="6" fill="#1a1a1a"/>
              <ellipse cx="50" cy="28" rx="7" ry="6" fill="#1a1a1a"/>
              <circle cx="34" cy="28" r="3" fill="#6aaa3a"/>
              <circle cx="50" cy="28" r="3" fill="#6aaa3a"/>
              <ellipse cx="42" cy="35" rx="4" ry="3" fill="#1a1a1a"/>
              <ellipse cx="18" cy="62" rx="9" ry="14" fill="#2a2a2a" transform="rotate(-15 18 62)"/>
              <ellipse cx="66" cy="60" rx="9" ry="14" fill="#2a2a2a" transform="rotate(15 66 60)"/>
              <rect x="36" y="37" width="18" height="3" rx="1" fill="#8bac0f" transform="rotate(-8 36 37)"/>
              <ellipse cx="32" cy="80" rx="10" ry="8" fill="#2a2a2a"/>
              <ellipse cx="52" cy="80" rx="10" ry="8" fill="#2a2a2a"/>
              <rect x="22" y="52" width="40" height="10" rx="3" fill="#1a1a1a"/>
            </svg>
          </div>

          <div class="pdx-stats">
            <div class="pdx-stat-box">
              <span class="pdx-stat-num" id="days">--</span>
              <span class="pdx-stat-lbl">DIAS</span>
            </div>
            <div class="pdx-stat-box">
              <span class="pdx-stat-num" id="hours">--</span>
              <span class="pdx-stat-lbl">HORAS</span>
            </div>
            <div class="pdx-stat-box">
              <span class="pdx-stat-num" id="minutes">--</span>
              <span class="pdx-stat-lbl">MINUTOS</span>
            </div>
            <div class="pdx-stat-box">
              <span class="pdx-stat-num" id="seconds">--</span>
              <span class="pdx-stat-lbl">SEGUNDOS</span>
            </div>
          </div>
        </div>

        <div class="pdx-footer-text">
          HABITAT: CONVERSACIONES LARGAS<br>
          DEBILIDAD: LA REALIDAD<br>
          EVOLUCION: <span id="evol-text">PENDIENTE</span><span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="pdx-hinge">
    <div class="pdx-hinge-dot"></div>
    <div class="pdx-hinge-dot"></div>
    <div class="pdx-hinge-dot"></div>
    <div class="pdx-hinge-dot"></div>
    <div class="pdx-hinge-dot"></div>
  </div>

  <div class="pdx-bottom-body">
    <div class="pdx-controls">
      <div class="dpad">
        <div class="dpad-h"></div>
        <div class="dpad-v"></div>
        <div class="dpad-center"></div>
      </div>
      <div class="pdx-startsel">
        <div><div class="pdx-ss-btn"></div><span class="pdx-ss-lbl">SELECT</span></div>
        <div><div class="pdx-ss-btn"></div><span class="pdx-ss-lbl">START</span></div>
      </div>
      <div class="pdx-ab">
        <div class="pdx-btn-b">B</div>
        <div class="pdx-btn-a">A</div>
      </div>
      <div class="pdx-speaker">
        <div class="sp-line" style="width:28px"></div>
        <div class="sp-line" style="width:24px"></div>
        <div class="sp-line" style="width:20px"></div>
        <div class="sp-line" style="width:16px"></div>
        <div class="sp-line" style="width:12px"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const START = new Date('2026-03-20T00:00:00').getTime();
  const TOTAL = 29 * 24 * 60 * 60 * 1000;
  const END   = START + TOTAL;
  let revealed = false;

  function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }

  function reveal(){
    if(revealed) return;
    revealed = true;

    const screen = document.getElementById('pdx-screen');
    const flash = document.createElement('div');
    flash.className = 'capture-flash';
    screen.appendChild(flash);

    setTimeout(()=>{
      screen.className = 'capture-screen';
      screen.innerHTML = `
        <div class="pdx-scanlines"></div>
        <div class="pdx-row" style="width:100%;padding:0 2px">
          <span>NO.675</span><span>18/04/2026</span>
        </div>
        <div class="pdx-title" style="font-size:7px">!LOREN SALVAJE!</div>
        <div class="pdx-type-badge">TIPO: LUCHA / SINIESTRO</div>
        <div class="capture-img-box">
          <svg width="80" height="82" viewBox="0 0 84 88" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="42" cy="60" rx="26" ry="24" fill="#2a2a2a"/>
            <circle cx="42" cy="30" r="20" fill="#d4d4d4"/>
            <ellipse cx="25" cy="14" rx="7" ry="8" fill="#2a2a2a"/>
            <ellipse cx="59" cy="14" rx="7" ry="8" fill="#2a2a2a"/>
            <ellipse cx="25" cy="15" rx="4" ry="5" fill="#555"/>
            <ellipse cx="59" cy="15" rx="4" ry="5" fill="#555"/>
            <ellipse cx="34" cy="28" rx="7" ry="6" fill="#2a2a2a"/>
            <ellipse cx="50" cy="28" rx="7" ry="6" fill="#2a2a2a"/>
            <circle cx="34" cy="28" r="3" fill="#ff4444"/>
            <circle cx="50" cy="28" r="3" fill="#ff4444"/>
            <ellipse cx="42" cy="35" rx="4" ry="3" fill="#2a2a2a"/>
            <ellipse cx="18" cy="62" rx="9" ry="14" fill="#2a2a2a" transform="rotate(-15 18 62)"/>
            <ellipse cx="66" cy="60" rx="9" ry="14" fill="#2a2a2a" transform="rotate(15 66 60)"/>
            <rect x="36" y="37" width="18" height="3" rx="1" fill="#c8a040" transform="rotate(-8 36 37)"/>
            <ellipse cx="32" cy="80" rx="10" ry="8" fill="#2a2a2a"/>
            <ellipse cx="52" cy="80" rx="10" ry="8" fill="#2a2a2a"/>
            <rect x="22" y="52" width="40" height="10" rx="3" fill="#444"/>
          </svg>
        </div>
        <div class="capture-msg">
          !UN LOREN SALVAJE<br>
          HA APARECIDO!<br><br>
          !LOREN ha sido<br>
          CAPTURADO!
        </div>
        <div class="capture-sub">
          EL HONEYMOON EXPIRO.<br>
          YA NO HAY NOMBRE PARA ESTO.<br>
          AHORA QUE?<span class="cursor"></span>
        </div>`;
    }, 700);
  }

  function tick(){
    const now  = Date.now();
    const diff = END - now;

    const ed = document.getElementById('end-date');
    if(ed && !revealed){
      const e = new Date(END);
      ed.textContent = pad(e.getDate())+'/'+pad(e.getMonth()+1)+'/'+e.getFullYear();
    }

    const bar = document.getElementById('progress-bar');
    const pt  = document.getElementById('progress-text');
    if(bar && !revealed){
      const elapsed = now - START;
      const pct = Math.min(100, Math.max(0, (elapsed / TOTAL) * 100));
      bar.style.width = (100 - pct) + '%';
      const dayElapsed = Math.floor(elapsed / 86400000);
      if(pt) pt.textContent = 'DIA '+Math.min(dayElapsed,29)+' / 29';
    }

    if(diff <= 0){ reveal(); return; }

    const d=Math.floor(diff/86400000);
    const h=Math.floor((diff%86400000)/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);

    const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=pad(v);};
    set('days',d); set('hours',h); set('minutes',m); set('seconds',s);

    const evolEl = document.getElementById('evol-text');
    if(evolEl){
      if(d < 1)      evolEl.textContent = '!HOY!';
      else if(d < 3) evolEl.textContent = 'INMINENTE';
      else           evolEl.textContent = 'PENDIENTE';
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
